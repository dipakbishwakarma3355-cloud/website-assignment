<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nearby Clinics - HealthWaze Local</title>
  
  <link rel="stylesheet" href="../../css/main.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  
  <style>
    .map-container {
      height: 500px;
      width: 100%;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: var(--shadow-md);
      z-index: 1; /* Keep leaflet under floating elements */
    }
    .clinic-list {
      margin-top: 24px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }
  </style>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>

  <div class="app-container">
    <div id="layout-header"></div>
    
    <div class="main-grid">
      <div id="layout-sidebar"></div>
      
      <main id="main-content">
        <h1 style="font-size: 24px; font-weight: 700; margin-bottom: 20px;">Nearby Clinics</h1>
        
        <div id="map" class="map-container"></div>

        <div class="clinic-list" id="clinicList">
          <!-- Populated by JS -->
        </div>
      </main>
    </div>

    <div id="layout-mobile-nav"></div>
  </div>

  <script src="../../js/auth.js"></script>
  <script src="../../js/mockData.js"></script>
  <script src="../../js/layout.js"></script>
  
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      Layout.renderPatientLayout('clinics');
      
      // Initialize Leaflet Map
      const map = L.map('map').setView([51.505, -0.09], 13);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
      }).addTo(map);

      // Add Mock Markers
      const coords = [
        [51.505, -0.09], [51.51, -0.1], [51.49, -0.08], [51.50, -0.12]
      ];

      const clinicListContainer = document.getElementById('clinicList');
      
      window.MOCK_CLINICS.forEach((clinic, i) => {
        // Map Marker
        const marker = L.marker(coords[i % coords.length]).addTo(map);
        marker.bindPopup(`<b>${clinic.name}</b><br>${clinic.address}`);

        // List Item
        const statusColor = clinic.isOpen ? 'var(--success)' : 'var(--danger)';
        clinicListContainer.innerHTML += `
          <div class="card" style="padding: 20px; border-left: 4px solid ${statusColor};">
            <h3 style="font-size: 18px; font-weight: bold; margin-bottom: 8px;">${clinic.name}</h3>
            <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 4px;">
              <i data-lucide="map-pin" style="width: 14px; height: 14px; display: inline-block;"></i>
              ${clinic.address} • ${clinic.distance}
            </p>
            <p style="color: ${statusColor}; font-weight: bold; font-size: 14px;">
              ${clinic.isOpen ? 'Open Now' : 'Closed'}
            </p>
          </div>
        `;
      });
      
      lucide.createIcons();
    });
  </script>
</body>
</html>
