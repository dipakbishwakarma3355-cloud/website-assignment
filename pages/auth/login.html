<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - HealthWaze Local</title>
  
  <link rel="stylesheet" href="../../css/main.css" />
  <style>
    body {
      background-color: var(--primary);
      justify-content: center;
      align-items: center;
    }
    .auth-card {
      background: var(--white);
      padding: 40px;
      border-radius: 24px;
      width: 100%;
      max-width: 400px;
      box-shadow: var(--shadow-lg);
      margin: 20px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      font-size: 14px;
    }
    .full-btn {
      width: 100%;
      padding: 14px;
      font-size: 16px;
    }
    .auth-links {
      margin-top: 24px;
      text-align: center;
      font-size: 14px;
      color: var(--text-muted);
    }
    .auth-links a {
      color: var(--primary);
      font-weight: 700;
    }
  </style>

  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

  <div class="auth-card">
    <div style="text-align: center; margin-bottom: 32px;">
      <i data-lucide="activity" style="color: var(--primary); width: 48px; height: 48px;"></i>
      <h1 style="font-size: 24px; font-weight: 800; margin-top: 16px;">Welcome Back</h1>
      <p style="color: var(--text-muted); margin-top: 8px;">Log in to HealthWaze Local</p>
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" class="input-field" required placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" class="input-field" required placeholder="••••••••" />
      </div>

      <div class="form-group">
        <label style="display: flex; gap: 8px; align-items: center; font-weight: normal; cursor: pointer;">
          <input type="checkbox" id="isDoctor" />
          I am registering/logging in as a healthcare professional
        </label>
      </div>

      <button type="submit" class="btn btn-primary full-btn">Log In</button>
    </form>

    <div class="auth-links">
      Don't have an account? <a href="../auth/signup.html">Sign up</a>
    </div>
  </div>

  <script src="../../js/auth.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      lucide.createIcons();
      
      const form = document.getElementById('loginForm');
      form.addEventListener('submit', (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const isDoctor = document.getElementById('isDoctor').checked;
        
        Auth.login(email, isDoctor ? 'doctor' : 'patient');
        
        if (isDoctor) {
          window.location.href = '../dashboard/doctor-dashboard.html';
        } else {
          window.location.href = '../main/index.html';
        }
      });
    });
  </script>
</body>
</html>
